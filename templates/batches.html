{% extends "base.html" %}
{% block content %}

<div class="card">
  <h2>Create Batch</h2>

  <form method="POST" action="{{ url_for('create_batch') }}">
    <input name="name" type="text" placeholder="Batch name" required>
    <input name="count" type="number" placeholder="Spider count" min="1" required>
    <button class="btn" type="submit">Create</button>
  </form>
</div>

{% if batches %}
  <div class="card">
    <div class="batch-list">
      {% for batch in batches %}
        <div class="batch-tile">
          <div class="batch-left">
            <div class="batch-name">{{ batch["name"] }}</div>
            <div class="batch-sub">Spiders: {{ count_map.get(batch["id"], 0) }}</div>
          </div>
          <div class="batch-actions">
            <a class="btn" href="{{ url_for('batch_view', batch_id=batch['id']) }}">Open</a>
            <a class="btn-outline"
               href="{{ url_for('delete_batch', batch_id=batch['id']) }}"
               onclick="return confirm('Delete this batch?')">Delete</a>
          </div>
        </div>
      {% endfor %}
    </div>
  </div>
{% else %}
  <div class="card">
    <p>No batches yet. Create one above.</p>
  </div>
{% endif %}

{% endblock %}
